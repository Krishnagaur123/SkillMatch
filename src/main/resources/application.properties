spring.application.name=skillmatch

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-ms=86400000
app.jwt.refresh-token-expiration-days=30

app.auth.redirect-url=${AUTH_REDIRECT_URL:http://localhost:3000/auth/callback}
app.cookie.secure=${COOKIE_SECURE:false}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

app.resume.storage-path=uploads/resumes
app.resume.max-file-size-mb=10


spring.web.resources.add-mappings=false
spring.mvc.throw-exception-if-no-handler-found=true
server.error.whitelabel.enabled=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB