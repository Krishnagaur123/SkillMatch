services:
  postgres:
    image: postgres:16

    container_name: skillmatch-postgres

    environment:
      POSTGRES_DB: skillmatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - skillmatch_postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  skillmatch_postgres_data: